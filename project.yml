name: ScreenTax
options:
  bundleIdPrefix: com.screentax
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: YES

targets:
  ScreenTax:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    dependencies:
      - target: ScreenTaxMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screentax.ScreenTax
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: ScreenTax
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES

  ScreenTaxMonitor:
    type: app-extension
    platform: iOS
    sources:
      - path: Monitor
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.screentax.ScreenTax.Monitor
        CODE_SIGN_ENTITLEMENTS: Monitor/Monitor.entitlements
        INFOPLIST_FILE: Monitor/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
